server:
  port: 8060

spring:
  application:
    name: tododook
  config:
    import: application_secret.yml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/tododook_local?useUnicode=true&characterEncoding=utf8&autoReconnect=true&serverTimezone=Asia/Seoul
    username: root
    password: 1234
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  servlet:
    multipart:
      max-file-size: 5MB      # 파일 1개 최대 크기
      max-request-size: 10MB  # 전체 요청 최대 크기

jwt:
  secret: tododook-jwt-secret-key-min-256-bits-for-hs256-please-change-in-production
  expiration-ms: 86400000

kakao:
  client-id: f7870284b7c4eaedbcfc19f55dcfa93f
  redirect-uri: http://localhost:5173/kakao/callback
  # client-secret은 application_secret.yml에서 관리

