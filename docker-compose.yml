version: "3.8"

services:
  app:
    build: .
    container_name: tododook-app
    restart: always
    expose:
      - "8060"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tododook?serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 1234

  nginx:
    image: nginx:alpine
    container_name: tododook-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./data/certbot/www:/var/www/certbot
      - ./data/certbot/conf:/etc/letsencrypt
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    container_name: tododook-certbot
    volumes:
      - ./data/certbot/www:/var/www/certbot
      - ./data/certbot/conf:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "
      certbot certonly --webroot -w /var/www/certbot \
      -d api.tododook.com --agree-tos --email a46884334@gmail.com --non-interactive &&
      while :; do certbot renew; sleep 12h & wait $${!}; done
      "